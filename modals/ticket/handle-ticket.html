<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:520px;">
    <div class="ant-modal-header"><span id="ticket-handle-title">处理工单</span> <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label">工单编号</div>
        <div class="ant-form-control"><span id="ticket-handle-id" style="font-weight:500;">--</span></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">工单标题</div>
        <div class="ant-form-control"><span id="ticket-handle-name">--</span></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>处理备注</div>
        <div class="ant-form-control">
          <textarea class="ant-textarea" id="ticket-handle-remark" placeholder="请输入处理备注..."></textarea>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确认处理</button>
    </div>
  </div>
</div>
