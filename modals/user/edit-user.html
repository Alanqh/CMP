<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:480px;">
    <div class="ant-modal-header">编辑用户 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>姓名</div>
        <div class="ant-form-control"><input class="ant-input" id="edit-user-name" placeholder="请输入姓名" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">手机号</div>
        <div class="ant-form-control"><input class="ant-input" id="edit-user-phone" placeholder="请输入手机号" /></div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
