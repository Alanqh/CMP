<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal">
    <div class="ant-modal-header">创建组 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>上级部门</div>
        <div class="ant-form-control"><select class="ant-select" id="modal-group-dept" style="width:100%;max-width:360px;"><option>基础架构部</option><option>业务研发部</option><option>数据平台部</option></select></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>上级组</div>
        <div class="ant-form-control">
          <select class="ant-select" id="modal-group-parent" style="width:100%;max-width:360px;"><option>（直属部门）</option><option>容器平台组</option><option>网络组</option><option>存储组</option></select>
          <div class="ant-form-extra">选择「直属部门」即创建一级组，选择已有一级组则创建二级组</div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>组名称</div>
        <div class="ant-form-control"><input class="ant-input" id="modal-group-name" placeholder="请输入组名称" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">组长</div>
        <div class="ant-form-control">
          <select class="ant-select" id="modal-group-leader" style="width:100%;max-width:360px;"><option value="">（暂不指定）</option><option>李思远 (lisy@sohu-inc.com)</option><option>赵雪晴 (zhaoxq@sohu-inc.com)</option><option>陈天宇 (chenty@sohu-inc.com)</option></select>
          <div class="ant-form-extra">可选，创建后也可在组详情中指定组长</div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">ERP匹配规则</div>
        <div class="ant-form-control">
          <input class="ant-input" id="modal-group-matchrule" placeholder="如：容器|docker|k8s" />
          <div class="ant-form-extra">用于匹配ERP员工部门，支持正则表达式或简单字符串，多个规则用 | 分隔</div>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
