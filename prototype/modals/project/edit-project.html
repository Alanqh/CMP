<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:600px;">
    <div class="ant-modal-header"><span id="project-edit-title">编辑资源组</span> <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>资源组名称</div>
        <div class="ant-form-control"><input class="ant-input" id="edit-project-name" placeholder="请输入资源组名称" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">描述</div>
        <div class="ant-form-control"><textarea class="ant-textarea" id="edit-project-desc" placeholder="请输入资源组描述"></textarea></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">所属部门</div>
        <div class="ant-form-control"><input class="ant-input" id="edit-project-dept" disabled style="background:#f5f5f5;" /></div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
