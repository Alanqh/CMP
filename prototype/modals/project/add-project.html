<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal">
    <div class="ant-modal-header">创建项目 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-alert ant-alert-info" style="margin-bottom:16px;">项目是资源的逻辑容器，用于组织和管理一组资源，支持批量授权。一个资源仅能绑定一个项目。</div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>所属部门</div>
        <div class="ant-form-control">
          <select class="ant-select" id="modal-project-dept" style="width:100%;max-width:360px;"></select>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>项目名称</div>
        <div class="ant-form-control"><input class="ant-input" id="modal-project-name" placeholder="请输入项目名称" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">描述</div>
        <div class="ant-form-control"><textarea class="ant-textarea" id="modal-project-desc" placeholder="请描述项目用途..."></textarea></div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
