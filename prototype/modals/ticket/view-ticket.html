<div class="ant-drawer-overlay" style="display:none;">
  <div class="ant-drawer">
    <div class="ant-drawer-header"><span id="view-ticket-title">工单详情</span> <button class="ant-drawer-close">&times;</button></div>
    <div class="ant-drawer-body">
      <div class="ant-descriptions" style="margin-bottom:16px;">
        <div class="ant-descriptions-row"><div class="ant-descriptions-label">工单号</div><div class="ant-descriptions-content" id="view-ticket-id">--</div></div>
        <div class="ant-descriptions-row"><div class="ant-descriptions-label">类型</div><div class="ant-descriptions-content" id="view-ticket-type">--</div></div>
        <div class="ant-descriptions-row"><div class="ant-descriptions-label">状态</div><div class="ant-descriptions-content" id="view-ticket-status">--</div></div>
        <div class="ant-descriptions-row"><div class="ant-descriptions-label">申请人</div><div class="ant-descriptions-content" id="view-ticket-applicant">--</div></div>
        <div class="ant-descriptions-row"><div class="ant-descriptions-label">处理人</div><div class="ant-descriptions-content" id="view-ticket-handler">--</div></div>
        <div class="ant-descriptions-row"><div class="ant-descriptions-label">关联资源</div><div class="ant-descriptions-content" id="view-ticket-resource">--</div></div>
        <div class="ant-descriptions-row"><div class="ant-descriptions-label">描述</div><div class="ant-descriptions-content" id="view-ticket-desc">--</div></div>
      </div>
      <div style="font-weight:500;margin-bottom:8px;">审核流程 / 处理记录</div>
      <div id="view-ticket-timeline" style="padding-left:16px;border-left:2px solid #e8e8e8;"></div>
    </div>
    <div class="ant-drawer-footer">
      <button class="ant-btn" data-close-modal>关闭</button>
    </div>
  </div>
</div>
