<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:600px;">
    <div class="ant-modal-header">创建工单 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>问题类别</div>
        <div class="ant-form-control">
          <select class="ant-select" id="create-ticket-category" style="width:100%;">
            <option value="">请选择问题类别...</option>
          </select>
          <div class="ant-form-extra">处理人：<span id="create-ticket-handler-hint">请先选择问题类别</span></div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>工单标题</div>
        <div class="ant-form-control"><input class="ant-input" id="create-ticket-title" placeholder="请输入工单标题" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>问题描述</div>
        <div class="ant-form-control"><textarea class="ant-textarea" id="create-ticket-desc" placeholder="请详细描述您遇到的问题..." rows="4"></textarea></div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">提交工单</button>
    </div>
  </div>
</div>
