<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal">
    <div class="ant-modal-header"><span title="仅超级管理员可创建部门">创建部门</span> <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>部门名称</div>
        <div class="ant-form-control"><input class="ant-input" id="modal-dept-name" placeholder="请输入部门名称" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>部门负责人</div>
        <div class="ant-form-control">
          <select class="ant-select" id="modal-dept-leader" style="width:100%;max-width:360px;">
            <option value="">请选择负责人...</option>
            <option value="zhangmy">张明远 (zhangmy@sohu-inc.com)</option>
            <option value="liujq">刘佳琪 (liujq@sohu-inc.com)</option>
            <option value="zhouwb">周文博 (zhouwb@sohu-inc.com)</option>
            <option value="lisy">李思远 (lisy@sohu-inc.com)</option>
            <option value="zhaoxq">赵雪晴 (zhaoxq@sohu-inc.com)</option>
          </select>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">成员匹配规则</div>
        <div class="ant-form-control">
          <input class="ant-input" id="modal-dept-matchrule" placeholder="请输入成员匹配规则" />
          <div class="ant-form-extra">提示：填写成员在ERP系统中的部门，支持通配符*，多条规则用英文逗号分隔，匹配后自动归组，优先归到下级组</div>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
