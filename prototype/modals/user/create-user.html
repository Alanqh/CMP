<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:520px;">
    <div class="ant-modal-header">创建用户 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-alert ant-alert-info" style="margin-bottom:16px;font-size:13px;">
        说明：正常情况下用户从ERP自动同步。此功能用于新入职员工或从其他系统迁移的特殊场景。
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>姓名</div>
        <div class="ant-form-control"><input class="ant-input" id="create-user-name" placeholder="请输入姓名" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>邮箱前缀</div>
        <div class="ant-form-control">
          <input class="ant-input" id="create-user-username" placeholder="请输入邮箱前缀" />
          <div class="ant-form-extra">邮箱为系统唯一标识，如 zhangsan → zhangsan@sohu-inc.com</div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">手机号</div>
        <div class="ant-form-control"><input class="ant-input" id="create-user-phone" placeholder="选填" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>所属组织</div>
        <div class="ant-form-control">
          <select class="ant-select" id="create-user-org" style="width:100%;"></select>
          <div class="ant-form-extra">请选择用户所属的部门或组</div>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
