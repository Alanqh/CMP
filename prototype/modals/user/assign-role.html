<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:800px;">
    <div class="ant-modal-header">分配角色 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item" style="margin-bottom:16px;">
        <div class="ant-form-label">用户</div>
        <div class="ant-form-control"><span id="assign-role-user-name" style="font-weight:500;line-height:32px;">--</span></div>
      </div>
      <div class="ant-form-item" style="margin-bottom:8px;">
        <div class="ant-form-label"><span class="required">*</span>选择角色</div>
        <div class="ant-form-control">
          <div class="ant-input-search" style="margin-bottom:8px;">
            <input id="assign-role-search" placeholder="搜索角色名称..." style="width:100%;" />
            <button class="ant-input-search-button">&#128269;</button>
          </div>
          <div id="assign-role-list" class="assign-role-checklist"></div>
          <div class="assign-role-footer">
            已选 <strong id="assign-role-count">0</strong> 个角色
            <span style="color:var(--text-secondary);margin-left:8px;font-size:13px;">超管可创建角色，部门负责人可为部门内成员分配已有角色</span>
          </div>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary" id="assign-role-confirm-btn">确定</button>
    </div>
  </div>
</div>
