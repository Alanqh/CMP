<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:600px;">
    <div class="ant-modal-header">申请子账号 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-alert ant-alert-info" style="margin-bottom:16px;">子账号将由部门负责人/运维审批后自动创建。子账号归属于个人，仅供本人查看。</div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>云厂商</div>
        <div class="ant-form-control">
          <select class="ant-select" style="width:100%;max-width:360px;" disabled><option>阿里云</option></select>
          <div class="ant-form-extra">一期仅支持阿里云，自动使用部门绑定的主账号创建</div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>账号名称</div>
        <div class="ant-form-control"><input class="ant-input" id="modal-sub-name" placeholder="如: yourname-dev" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>权限包</div>
        <div class="ant-form-control">
          <select class="ant-select" id="perm-pkg-select" style="width:100%;"></select>
          <div id="perm-pkg-detail" style="margin-top:8px;"></div>
          <div class="ant-form-extra">权限包由产品/运维预配置（<code>perm-packages.json</code>），每个包对应一组阿里云 RAM 策略</div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>有效期类型</div>
        <div class="ant-form-control">
          <div class="ant-radio-group">
            <label class="ant-radio-wrapper"><input type="radio" name="sub-duration" value="long" checked /> 长期持有</label>
          </div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>用途说明</div>
        <div class="ant-form-control"><textarea class="ant-textarea" id="modal-sub-desc" placeholder="请描述子账号用途..."></textarea></div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">提交申请</button>
    </div>
  </div>
</div>
