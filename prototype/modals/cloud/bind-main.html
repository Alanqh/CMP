<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:520px;">
    <div class="ant-modal-header">关联主账号 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-alert ant-alert-info" style="margin-bottom:16px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;padding:8px 12px;color:#1890ff;font-size:13px;">
        &#9432; 请确保主账号具备创建子账号（RAM用户）的权限，平台将使用该账号统一管理云上资源。
      </div>
      <div class="ant-alert ant-alert-warning" style="margin-bottom:16px;background:#fffbe6;border:1px solid #ffe58f;border-radius:4px;padding:8px 12px;color:#d48806;font-size:13px;">
        &#9888; 关联后，该账号下已有的存量子账号将默认归属给部门负责人，由负责人统一分配。
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>云厂商</div>
        <div class="ant-form-control">
          <select class="ant-select" id="bind-cloud-vendor" style="width:100%;">
            <option value="阿里云">阿里云</option>
          </select>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>账号别名</div>
        <div class="ant-form-control"><input class="ant-input" id="bind-cloud-alias" placeholder="请输入账号别名，如 infra-main" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>AccessKey ID</div>
        <div class="ant-form-control"><input class="ant-input" id="bind-cloud-ak" placeholder="请输入 AccessKey ID" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>AccessKey Secret</div>
        <div class="ant-form-control"><input class="ant-input" id="bind-cloud-sk" type="password" placeholder="请输入 AccessKey Secret" /></div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确认关联</button>
    </div>
  </div>
</div>
