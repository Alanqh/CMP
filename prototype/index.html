<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMP 云管理平台 - 一期原型</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== Panther 平台顶栏 (模拟 vite-plugin-panther 注入) ===== -->
<div class="panther-topbar">
  <div class="panther-topbar-left">
    <!-- Logo -->
    <div class="panther-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="4" fill="#1890ff"/>
        <path d="M7 7h4v4H7V7zm6 0h4v4h-4V7zM7 13h4v4H7v-4zm6 0h4v4h-4v-4z" fill="#fff" fill-opacity="0.9"/>
      </svg>
      <span class="panther-logo-text">Panther</span>
    </div>
    <div class="panther-topbar-divider"></div>
    <!-- 导航 -->
    <span class="panther-nav-item">控制台</span>
    <span class="panther-nav-item active">CMP</span>
    <span class="panther-nav-item">全部产品 &#9662;</span>
    <!-- 搜索 -->
    <div class="panther-search">
      <span class="panther-search-icon">&#128269;</span>
      <span class="panther-search-text">搜索服务、文档...</span>
    </div>
  </div>
  <div class="panther-topbar-right">
    <!-- 工单 -->
    <div class="panther-icon-btn" title="工单">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
    </div>
    <!-- 值班 -->
    <div class="panther-icon-btn" title="值班">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>
    </div>
    <!-- 学习中心 -->
    <div class="panther-icon-btn" title="学习中心">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l4 2.2v6L12 21l7-3.8v-6l2-1.1V17h2V9L12 3zm0 12.5L5.5 12 12 8.5 18.5 12 12 15.5zM17 16l-5 2.7L7 16v-3.4l5 2.7 5-2.7V16z"/></svg>
    </div>
    <!-- 通知 -->
    <div class="panther-icon-btn" title="通知">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
      <span class="icon-badge"></span>
    </div>
    <div class="panther-topbar-divider"></div>
    <!-- 用户 -->
    <div class="panther-user-info">
      <div class="panther-avatar">管</div>
      <span class="panther-username">admin</span>
    </div>
  </div>
</div>

<div class="ant-layout ant-layout-has-sider">

  <!-- ===== 左侧导航 (Ant Design Sider theme=dark) ===== -->
  <div class="ant-layout-sider">
    <span class="sider-title">CMP 云管理平台</span>
    <div class="ant-menu-dark">
      <div class="menu-group-title menu-group-toggle" data-menu-group="org-mgmt">
        <span class="menu-group-icon">&#128101;</span>组织管理<span class="menu-group-arrow">&#8250;</span>
      </div>
      <div class="menu-submenu collapsed" data-menu-group-body="org-mgmt">
        <div class="menu-item active" data-page="org">
          <span class="menu-icon">&#9776;</span> 组织架构
        </div>
        <div class="menu-item" data-page="role">
          <span class="menu-icon">&#9881;</span> 角色管理
        </div>
        <div class="menu-item" data-page="user" title="仅超级管理员可管理">
          <span class="menu-icon">&#128100;</span> 用户管理
        </div>
        <div class="menu-item" data-page="dept-config">
          <span class="menu-icon">&#9881;</span> 部门配置
        </div>
      </div>
      <div class="menu-group-title menu-group-toggle" data-menu-group="account-project">
        <span class="menu-group-icon">&#128273;</span>账号 &amp; 资源组<span class="menu-group-arrow">&#8250;</span>
      </div>
      <div class="menu-submenu collapsed" data-menu-group-body="account-project">
        <div class="menu-item" data-page="cloud">
          <span class="menu-icon">&#9729;</span> 云账号
        </div>
        <div class="menu-item" data-page="project">
          <span class="menu-icon">&#9830;</span> 资源组管理
        </div>
      </div>
      <div class="menu-group-title menu-group-toggle" data-menu-group="resource-center">
        <span class="menu-group-icon">&#128451;</span>资源中心<span class="menu-group-arrow">&#8250;</span>
      </div>
      <div class="menu-submenu collapsed" data-menu-group-body="resource-center">
        <div class="menu-item" data-page="res-catalog">
          <span class="menu-icon">&#128218;</span> 资源目录
        </div>
        <div class="menu-item" data-page="res-config">
          <span class="menu-icon">&#9881;</span> 资源配置
        </div>
        <div class="menu-item" data-page="resource">
          <span class="menu-icon">&#9733;</span> 资源列表
        </div>
        <div class="menu-item" data-page="res-packages">
          <span class="menu-icon">&#128230;</span> 资源包
        </div>
      </div>
      <div class="menu-group-title menu-group-toggle" data-menu-group="apply-review">
        <span class="menu-group-icon">&#128203;</span>申请 &amp; 审核<span class="menu-group-arrow">&#8250;</span>
      </div>
      <div class="menu-submenu collapsed" data-menu-group-body="apply-review">
        <div class="menu-item" data-page="apply-records">
          <span class="menu-icon">&#128203;</span> 申请记录
        </div>
        <div class="menu-item" data-page="review-records">
          <span class="menu-icon">&#9745;</span> 审核记录
        </div>
      </div>
      <div class="menu-group-title menu-group-toggle" data-menu-group="ticket-audit">
        <span class="menu-group-icon">&#128196;</span>工单 &amp; 审计<span class="menu-group-arrow">&#8250;</span>
      </div>
      <div class="menu-submenu collapsed" data-menu-group-body="ticket-audit">
        <div class="menu-item" data-page="ticket">
          <span class="menu-icon">&#128203;</span> 工单管理
        </div>
        <div class="menu-item" data-page="audit">
          <span class="menu-icon">&#9673;</span> 操作审计
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 右侧内容区 ===== -->
  <div class="ant-layout-content-wrapper">
    <div id="page-container">
      <!-- 页面内容由 app.js 动态加载 -->
    </div>
  </div>

</div><!-- /layout -->

<!-- 弹窗容器 -->
<div id="modal-container"></div>

<!-- Mock data files -->
<script src="js/mock/base.js"></script>
<script src="js/mock/users.js"></script>
<script src="js/mock/cloud.js"></script>
<script src="js/mock/resource.js"></script>
<script src="js/mock/config.js"></script>
<script src="js/mock/workflow.js"></script>
<script src="js/mock/res-packages.js"></script>
<!-- Page files -->
<script src="js/pages/common.js"></script>
<script src="js/pages/router.js"></script>
<script src="js/pages/org.js"></script>
<script src="js/pages/cloud.js"></script>
<script src="js/pages/project.js"></script>
<script src="js/pages/res-catalog.js"></script>
<script src="js/pages/resource.js"></script>
<script src="js/pages/orphan.js"></script>
<script src="js/pages/role.js"></script>
<script src="js/pages/audit.js"></script>
<script src="js/pages/user.js"></script>
<script src="js/pages/ticket.js"></script>
<script src="js/pages/res-config.js"></script>
<script src="js/pages/dept-config.js"></script>
<script src="js/pages/apply.js"></script>
<script src="js/pages/res-packages.js"></script>
<script src="js/pages/init.js"></script>
</body>
</html>
