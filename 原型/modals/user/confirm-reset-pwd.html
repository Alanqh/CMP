<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:420px;">
    <div class="ant-modal-header">重置密码 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <span style="color:#faad14;font-size:22px;line-height:1;">&#128274;</span>
        <div>
          <p id="reset-pwd-msg" style="margin:0 0 8px;font-size:14px;color:#333;"></p>
          <p style="margin:0;font-size:13px;color:#999;">重置后密码将恢复为默认值，用户下次登录时需要修改密码。</p>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
