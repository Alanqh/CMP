<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:640px;">
    <div class="ant-modal-header">创建角色 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>角色名称</div>
        <div class="ant-form-control"><input class="ant-input" id="modal-role-name" placeholder="请输入角色名称" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">角色描述</div>
        <div class="ant-form-control"><textarea class="ant-textarea" id="modal-role-desc" placeholder="请输入角色描述..."></textarea></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>权限配置</div>
        <div class="ant-form-control">
          <div id="role-perm-modules"></div>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
