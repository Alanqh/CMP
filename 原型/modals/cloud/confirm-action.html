<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:420px;">
    <div class="ant-modal-header"><span id="cloud-confirm-title">确认操作</span> <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body" style="text-align:center;padding:24px;">
      <div style="font-size:40px;margin-bottom:12px;">&#9888;</div>
      <div id="cloud-confirm-msg" style="font-size:15px;font-weight:500;margin-bottom:8px;">确定执行此操作吗？</div>
      <div id="cloud-confirm-extra" style="color:var(--text-secondary);font-size:13px;"></div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary" id="cloud-confirm-ok" style="background:#ff4d4f;border-color:#ff4d4f;">确定</button>
    </div>
  </div>
</div>
