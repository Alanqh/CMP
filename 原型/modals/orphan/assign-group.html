<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:480px;">
    <div class="ant-modal-header"><span id="orphan-assign-title">分配到组</span> <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label">资源名称</div>
        <div class="ant-form-control"><span id="orphan-assign-resource" style="font-weight:500;">--</span></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>目标部门</div>
        <div class="ant-form-control">
          <select class="ant-select" id="orphan-assign-dept" style="width:100%;"></select>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>目标组</div>
        <div class="ant-form-control">
          <select class="ant-select" id="orphan-assign-group" style="width:100%;"></select>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
