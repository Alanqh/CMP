<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:560px;">
    <div class="ant-modal-header"><span id="catalog-child-title">添加子资源</span> <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <div class="ant-form-item">
        <div class="ant-form-label">所属父资源</div>
        <div class="ant-form-control"><input class="ant-input" id="catalog-child-parent" disabled style="background:#f5f5f5;" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>子资源名称</div>
        <div class="ant-form-control"><input class="ant-input" id="catalog-child-name" placeholder="例如：云硬盘" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">查询接口</div>
        <div class="ant-form-control"><input class="ant-input" id="catalog-child-query-api" placeholder="例如：DescribeDisks" style="max-width:360px;" /></div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">支持操作</div>
        <div class="ant-form-control">
          <div class="ant-checkbox-group" id="catalog-child-ops-group">
            <label class="ant-checkbox-wrapper"><input type="checkbox" value="申请" /> 申请</label>
            <label class="ant-checkbox-wrapper"><input type="checkbox" value="变配" /> 变配</label>
            <label class="ant-checkbox-wrapper"><input type="checkbox" value="扩容" /> 扩容</label>
            <label class="ant-checkbox-wrapper"><input type="checkbox" value="缩容" /> 缩容</label>
            <label class="ant-checkbox-wrapper"><input type="checkbox" value="重启" /> 重启</label>
            <label class="ant-checkbox-wrapper"><input type="checkbox" value="销毁" /> 销毁</label>
            <label class="ant-checkbox-wrapper"><input type="checkbox" value="续费" /> 续费</label>
          </div>
        </div>
      </div>
      <div class="ant-form-item">
        <div class="ant-form-label">需要审批的操作</div>
        <div class="ant-form-control">
          <div class="ant-checkbox-group" id="catalog-child-approval-ops-group"></div>
          <div class="ant-form-extra">从上方已选操作中选择需要走审批流程的</div>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
