<div class="ant-modal-overlay" style="display:none;">
  <div class="ant-modal" style="width:420px;">
    <div class="ant-modal-header">分配到部门 <button class="ant-modal-close">&times;</button></div>
    <div class="ant-modal-body">
      <p style="margin:0 0 12px;font-size:14px;color:#666;">将成员 <strong id="assign-dept-member-name"></strong> 分配到以下部门：</p>
      <div class="ant-form-item" style="margin-bottom:0;">
        <div class="ant-form-label"><span class="required">*</span>选择部门</div>
        <div class="ant-form-control">
          <select class="ant-select" id="assign-dept-select" style="width:100%;max-width:360px;">
            <option value="">请选择部门...</option>
          </select>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" data-close-modal>取消</button>
      <button class="ant-btn ant-btn-primary">确定</button>
    </div>
  </div>
</div>
